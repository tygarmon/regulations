name: Monthly Permit Check

on:
  # Runs at 9:00 AM UTC on the 1st of every month
  schedule:
    - cron: "0 9 1 * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  check-permits:
    runs-on: ubuntu-latest
    permissions:
      issues: write   # Create the review issue
      contents: write # Commit updated permit-hashes.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run permit check
        run: npx tsx scripts/check-permits.ts

      # Commit the updated hashes back to main so next month has a baseline
      - name: Commit updated permit-hashes.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/permit-hashes.json
          git diff --cached --quiet \
            || git commit -m "chore: update permit URL hashes $(date +%Y-%m) [skip ci]"
          git push

      # Create the GitHub Issue from the markdown report
      - name: Create review issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="Monthly Permit Review — $(date +'%B %Y')"
          BODY=$(cat data/check-report.md)

          # Close any previous open review issues so inbox stays clean
          gh issue list \
            --label "data-review" \
            --state open \
            --json number \
            --jq '.[].number' \
          | xargs -I{} gh issue close {} --comment "Superseded by new monthly check." 2>/dev/null || true

          # Create the new issue (label is created automatically if missing)
          gh issue create \
            --title "$TITLE" \
            --body "$BODY" \
            --label "data-review"

      # Always clean up the temp report file (don't commit it to the repo)
      - name: Remove temp report
        if: always()
        run: rm -f data/check-report.md
